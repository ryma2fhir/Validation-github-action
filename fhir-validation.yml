name: FHIR Validation

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'fhir/**'
      - 'examples/**'
      - 'package.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    services:
      hapi-fhir:
        image: hapiproject/hapi:latest
        ports:
          - 8080:8080
        env:
          HAPI_FHIR_VALIDATION_REQUESTS_ENABLED: "true"
          HAPI_FHIR_FHIR_VERSION: "R4"
        options: >-
          --health-cmd "curl -f http://localhost:8080/fhir/metadata || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pyyaml

      - name: Wait for HAPI FHIR to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/fhir/metadata; then
              echo "HAPI FHIR is ready"
              break
            fi
            echo "Waiting for HAPI FHIR... ($i/30)"
            sleep 5
          done

      - name: Configure HAPI FHIR with package dependencies
        run: python scripts/configure-packages.py

      - name: Upload FHIR assets
        run: python scripts/upload-assets.py

      - name: Validate FHIR assets
        run: python scripts/validate-assets.py

      - name: Upload CapabilityStatement
        run: python scripts/upload-capability.py

      - name: Validate examples
        run: python scripts/validate-examples.py

      - name: Generate validation report
        if: always()
        run: python scripts/generate-report.py

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: validation-results
          path: validation-report.md

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('validation-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
