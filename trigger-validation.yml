name: Trigger FHIR Validation

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'fhir/**'
      - 'examples/**'
      - 'resources/**'
      - 'package.json'
      - 'CapabilityStatement.json'
  
  pull_request:
    branches:
      - main
    paths:
      - 'fhir/**'
      - 'examples/**'
      - 'resources/**'
      - 'package.json'
      - 'CapabilityStatement.json'

jobs:
  trigger-validation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger validation service
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ryma2fhir/Validation-github-action
          event-type: validate-fhir-assets
          client-payload: |
            {
              "repository": "${{ github.repository }}",
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "pr_number": "${{ github.event.pull_request.number }}",
              "triggered_by": "${{ github.actor }}",
              "event_name": "${{ github.event_name }}"
            }
      
      - name: Wait for validation to start
        run: |
          echo "Validation triggered in ryma2fhir/Validation-github-action"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          sleep 10
      
      - name: Add validation status check
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              description: 'Validation in progress...',
              target_url: 'https://github.com/ryma2fhir/Validation-github-action/actions',
              context: 'FHIR Validation'
            });
